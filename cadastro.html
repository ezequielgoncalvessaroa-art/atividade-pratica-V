<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>
    <main class="container">
        <h1>Cadastro</h1>
        <form action="feed.html" method="get">
            <label for="nome">Nome</label>
            <input id="nome" name="nome" type="text" placeholder="Digite seu nome" required>

            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" placeholder="Digite seu e-mail" required>

            <label for="usuario">Usuário</label>
            <input id="usuario" name="usuario" type="text" placeholder="Escolha um nome de usuário" required>

            <label for="senha">Senha</label>
            <input id="senha" name="senha" type="password" minlength="6" placeholder="Digite sua senha" required>

            <label for="confirma-senha">Confirmação de senha</label>
            <input id="confirma-senha" name="confirma-senha" type="password" minlength="6" placeholder="Repita sua senha" required>

            <label for="genero">Gênero</label>
            <select id="genero" name="genero" required>
                <option value="">Selecione</option>
                <option value="feminino">Feminino</option>
                <option value="masculino">Masculino</option>
                <option value="nao-binario">Não-binário</option>
                <option value="outro">Outro</option>
                <option value="prefiro-nao-dizer">Prefiro não dizer</option>
            </select>

            <label for="nascimento">Data de Nascimento</label>
            <input id="nascimento" name="nascimento" type="date" required>

            <button type="submit">Cadastrar</button>
        </form>

        <p style="text-align: center; margin-top: 1rem;">
            <a href="index.html" class="contrast">Já possuo uma conta</a>
        </p>
    </main>
</body>
</html>
