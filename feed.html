<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .header-nav nav {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .avatar {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background-color: #777;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .post-card {
            border: 1px solid #ddd;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        .post-header {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .post-meta {
            display: flex;
            flex-direction: column;
        }
        .post-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <main class="container">
        <header class="header-nav">
            <nav>
                <a href="#">Início</a>
                <a href="#">Buscar</a>
                <a href="#">Perfil</a>
            </nav>
            <a href="index.html">Sair</a>
        </header>

        <section class="post-card">
            <h2>Novo post</h2>
            <div class="post-header">
                <span class="avatar"><img src="img/avatar.jpg.webp" alt="Avatar"></span>
                <div class="post-meta">
                    <strong>Ryan Brito</strong>
                    <span>@ryanbrito</span>
                </div>
            </div>
            <label for="new-post" class="visually-hidden">Escreva seu post</label>
            <textarea id="new-post" rows="5" placeholder="O que você está pensando hoje?" style="width:100%;"></textarea>
            <button type="button" style="margin-top: 1rem;">Publicar</button>
        </section>

        <section>
            <h2>Posts criados</h2>

            <article class="post-card">
                <div class="post-header">
                    <span class="avatar"><img src="img/avatar.jpg.webp" alt="Avatar"></span>
                    <div class="post-meta">
                        <strong>Luis Eduardo Lages</strong>
                        <span>@luiseduardolages</span>
                    </div>
                </div>
                <p>Hoje quase morri no trabalho de framework</p>
                <div class="post-actions">
                    <span>❤️ 24</span>
                    <span>💬 8</span>
                </div>
            </article>

            <article class="post-card">
                <div class="post-header">
                    <span class="avatar"><img src="img/avatar.jpg.webp" alt="Avatar"></span>
                    <div class="post-meta">
                        <strong>Ezequiel Gonçalves</strong>
                        <span>@ezequielgoncalves</span>
                    </div>
                </div>
                <p>Quero ir pra casa! Não sobrou nada</p>
                <div class="post-actions">
                    <span>❤️ 15</span>
                    <span>💬 4</span>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
